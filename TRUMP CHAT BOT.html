<!DOCTYPE html>
<html>
<head>
<title>free chat</title>
<style>
body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
}

#chat{
width:80%;
margin:auto;
height:400px;
overflow-y:auto;
border:1px solid gray;
padding:10px;
margin-bottom:120px;
}

input{
width:60%;
padding:10px;
}

button{
padding:10px 20px;
background:#00ff9d;
border:none;
cursor:pointer;
}
</style>

</head>

<body>

<h2>free chat</h2>

<div id="chat"></div>

<input type="text" id="question" placeholder="Ask something...">
<button onclick="send()">Send</button>

<script>

const API_KEY = "Your api key";

async function send(){

let question = document.getElementById("question").value;

document.getElementById("chat").innerHTML += "<p><b>You:</b> "+question+"</p>";

const response = await fetch(
'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}',
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{ text: question }
]
}
]
})
});

const data = await response.json();

let answer = data.candidates[0].content.parts[0].text;

document.getElementById("chat").innerHTML += "<p><b>AI:</b> "+answer+"</p>";

}

</script>

</body>
</html>
