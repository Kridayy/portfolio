<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sticky Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="board-bg"></div>

  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">📌</span>
        <h1>Sticky Notes</h1>
      </div>
      <button id="addNoteBtn" aria-label="Add new note">
        <span class="btn-icon">＋</span>
        <span>Add Note</span>
      </button>
    </div>
  </header>

  <main>
    <div id="emptyState" class="empty-state" hidden>
      <p class="empty-icon">🗒️</p>
      <p class="empty-text">No notes yet.<br>Click <strong>Add Note</strong> to get started.</p>
    </div>
    <div id="notesGrid" class="notes-grid"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
