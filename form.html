<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registration Form</title>
</head>
<body>

  <h2>Registration Form</h2>

  <form id="regForm">

    <label>Full Name:</label><br>
    <input type="text" id="name" oninput="validateName()"><br>
    <span id="nameError"></span><br>

    <label>Email:</label><br>
    <input type="email" id="email" oninput="validateEmail()"><br>
    <span id="emailError"></span><br>

    <label>Phone Number:</label><br>
    <input type="text" id="phone" oninput="validatePhone()"><br>
    <span id="phoneError"></span><br>

    <label>Password:</label><br>
    <input type="password" id="password" oninput="validatePassword()"><br>
    <span id="passwordError"></span><br>
    <span id="strengthText"></span><br>

    <label>
      <input type="checkbox" id="showPassword" onclick="togglePassword()"> Show Password
    </label><br><br>

    <button type="button" onclick="submitForm()">Register</button>

  </form>

  <p id="successMessage"></p>

  <script>

    function validateName() {
      var name = document.getElementById("name").value;
      var error = document.getElementById("nameError");
      if (name.length < 3) {
        error.textContent = "Name must be at least 3 characters.";
        return false;
      } else {
        error.textContent = "";
        return true;
      }
    }

    function validateEmail() {
      var email = document.getElementById("email").value;
      var error = document.getElementById("emailError");
      var emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailPattern.test(email)) {
        error.textContent = "Please enter a valid email address.";
        return false;
      } else {
        error.textContent = "";
        return true;
      }
    }

    function validatePhone() {
      var phone = document.getElementById("phone").value;
      var error = document.getElementById("phoneError");
      var phonePattern = /^\d{10}$/;
      if (!phonePattern.test(phone)) {
        error.textContent = "Phone number must be exactly 10 digits.";
        return false;
      } else {
        error.textContent = "";
        return true;
      }
    }

    function validatePassword() {
      var password = document.getElementById("password").value;
      var error = document.getElementById("passwordError");
      var strengthText = document.getElementById("strengthText");

      if (password.length < 8) {
        error.textContent = "Password must be at least 8 characters.";
        strengthText.textContent = "";
        return false;
      } else {
        error.textContent = "";
        checkPasswordStrength(password);
        return true;
      }
    }

    function checkPasswordStrength(password) {
      var strengthText = document.getElementById("strengthText");
      var score = 0;

      if (password.length >= 8)  score++;
      if (password.length >= 12) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[0-9]/.test(password)) score++;
      if (/[^A-Za-z0-9]/.test(password)) score++;

      if (score <= 2) {
        strengthText.textContent = "Password Strength: Weak";
      } else if (score <= 3) {
        strengthText.textContent = "Password Strength: Medium";
      } else {
        strengthText.textContent = "Password Strength: Strong";
      }
    }

    function togglePassword() {
      var passwordInput = document.getElementById("password");
      var checkbox = document.getElementById("showPassword");
      if (checkbox.checked) {
        passwordInput.type = "text";
      } else {
        passwordInput.type = "password";
      }
    }

    function submitForm() {
      var isNameValid     = validateName();
      var isEmailValid    = validateEmail();
      var isPhoneValid    = validatePhone();
      var isPasswordValid = validatePassword();

      if (!isNameValid || !isEmailValid || !isPhoneValid || !isPasswordValid) {
        return;
      }

      var user = {
        name:     document.getElementById("name").value,
        email:    document.getElementById("email").value,
        phone:    document.getElementById("phone").value,
        password: document.getElementById("password").value
      };

      var submissions = JSON.parse(localStorage.getItem("submissions")) || [];
      submissions.push(user);
      localStorage.setItem("submissions", JSON.stringify(submissions));

      document.getElementById("successMessage").textContent = "Registration successful!";
      document.getElementById("regForm").reset();
      document.getElementById("strengthText").textContent = "";
    }

  </script>

</body>
</html>
